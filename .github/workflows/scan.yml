name: TrendBreak Scanner

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Run 1 — 4:30 PM IST (11:00 UTC) weekdays
    #   → NSE has just closed (3:30 PM IST) ✅ full NSE day data
    #   → NYSE not open yet (opens 2:30 PM UTC / 9:30 AM EST) — uses prev day close
    - cron: '0 11 * * 1-5'

    # Run 2 — 2:30 AM IST next day (21:00 UTC) weekdays
    #   → NSE closed ✅
    #   → NYSE just closed (4:00 PM EST / 3:00 PM EDT) ✅ full NYSE EOD data
    - cron: '0 21 * * 1-5'

  # Allows you to run the scan manually from the Actions tab anytime
  workflow_dispatch:

# ── Permissions (needed to commit the HTML back to the repo) ──────────────────
permissions:
  contents: write
  pages: write
  id-token: write

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Cache pip packages so repeat runs are faster
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # 4. Install dependencies directly — no requirements.txt needed
      - name: Install dependencies
        run: pip install yfinance>=0.2.28 pandas>=2.0.0 numpy>=1.24.0

      # 5. Confirm the scanner script is present before running
      - name: Check scanner script exists
        run: |
          if [ ! -f trendline_scanner_v3.py ]; then
            echo "❌ trendline_scanner_v3.py not found in repo root!"
            echo "Make sure you committed the file. Repo contents:"
            ls -la
            exit 1
          fi
          echo "✅ trendline_scanner_v3.py found"

      # 6. Run the scanner — generates trendline_breakout_report.html
      - name: Run TrendBreak scanner
        run: python trendline_scanner_v3.py

      # 7. Copy report to docs/index.html  (GitHub Pages serves from /docs)
      - name: Prepare docs folder
        run: |
          mkdir -p docs
          cp trendline_breakout_report.html docs/index.html
          echo "Report copied to docs/index.html"

      # 8. Commit and push the updated report back to main
      - name: Commit updated report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          # Only commit if something actually changed
          git diff --staged --quiet || \
            git commit -m "📊 Auto scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
